<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>👧 秀秀 & 小妍 作业打卡</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%);
            min-height: 100vh;
            padding: 20px;
            transition: background 1s ease;
        }

        /* 不同累计天数的主题色 */
        body.level-0 { background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%); }
        body.level-1 { background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%); }
        body.level-2 { background: linear-gradient(135deg, #55efc4 0%, #00b894 100%); }
        body.level-3 { background: linear-gradient(135deg, #a29bfe 0%, #6c5ce7 100%); }
        body.level-4 { background: linear-gradient(135deg, #fab1a0 0%, #e17055 100%); }
        body.level-5 { background: linear-gradient(135deg, #fd79a8 0%, #e84393 100%); }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .current-date {
            font-size: 18px;
            margin-bottom: 8px;
            opacity: 0.95;
        }

        .stats {
            font-size: 16px;
            opacity: 0.9;
        }

        .view-calendar-btn {
            margin-top: 10px;
            padding: 6px 16px;
            background: rgba(255,255,255,0.3);
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        .kid-switch {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .kid-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .kid-btn.xiuxiu {
            background: #ffebee;
            color: #e91e63;
        }

        .kid-btn.xiaoyan {
            background: #e3f2fd;
            color: #1976d2;
        }

        .kid-btn.active {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .checklist {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .check-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 12px;
            background: #f8f9fa;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 3px solid transparent;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .check-item:hover {
            transform: translateX(5px);
        }

        .check-item:active {
            transform: scale(0.98);
        }

        .check-item.checked {
            background: #e8f5e9;
            border-color: #4caf50;
        }

        .check-item.disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .check-box {
            width: 30px;
            height: 30px;
            border: 3px solid #ddd;
            border-radius: 8px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .check-item.checked .check-box {
            background: #4caf50;
            border-color: #4caf50;
            color: white;
        }

        .check-text {
            flex: 1;
            font-size: 18px;
            color: #333;
            transition: all 0.3s ease;
        }

        .check-item.checked .check-text {
            text-decoration: line-through;
            color: #888;
        }

        .special-item {
            background: #fff3e0 !important;
            border-left: 5px solid #ff9800;
        }

        .encouragement {
            margin-top: 20px;
            padding: 20px;
            background: linear-gradient(135deg, #ff9ff3 0%, #f368e0 100%);
            border-radius: 15px;
            text-align: center;
            color: white;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .encouragement.show {
            opacity: 1;
            transform: translateY(0);
        }

        .encouragement-text {
            font-size: 20px;
            font-weight: bold;
            line-height: 1.4;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            background: #ff9800;
            color: white;
            font-size: 12px;
            border-radius: 20px;
            margin-left: 8px;
            font-weight: bold;
        }

        .submit-btn {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .submit-btn:hover {
            background: #388e3c;
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .reset-btn {
            width: 100%;
            margin-top: 10px;
            padding: 12px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .reset-btn:hover {
            background: #ff5252;
        }

        /* 礼花特效容器 - 保证不阻挡点击 */
        #fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            touch-action: none;
        }

        .firework-particle {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: explode 1.5s ease-out forwards;
        }

        .star-particle {
            position: absolute;
            font-size: 24px;
            animation: starFall 2s ease-out forwards;
        }

        .confetti-particle {
            position: absolute;
            width: 8px;
            height: 16px;
            animation: confettiFall 1.8s ease-out forwards;
        }

        .bubble-particle {
            position: absolute;
            border-radius: 50%;
            animation: bubbleRise 2s ease-out forwards;
        }

        @keyframes explode {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        @keyframes starFall {
            0% {
                transform: translate(0, 0) scale(0) rotate(0deg);
                opacity: 1;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(1) rotate(var(--r)deg);
                opacity: 0;
            }
        }

        @keyframes confettiFall {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), calc(var(--ty) + 200px)) rotate(var(--r)deg);
                opacity: 0;
            }
        }

        @keyframes bubbleRise {
            0% {
                transform: translate(0, 0) scale(0);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), calc(var(--ty) - 300px)) scale(1);
                opacity: 0;
            }
        }

        /* 点赞飞屏效果 */
        .pop-yeah {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 80px;
            z-index: 10000;
            pointer-events: none;
            animation: yeahPop 1.2s ease-out forwards;
        }

        @keyframes yeahPop {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(2);
                opacity: 0;
            }
        }

        .level-badge {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            font-weight: bold;
            margin-top: 10px;
        }

        .today-clear {
            text-align: center;
            padding: 10px;
            background: rgba(76, 175, 80, 0.1);
            border-radius: 10px;
            margin-bottom: 15px;
            color: #2e7d32;
            font-weight: bold;
            display: none;
        }

        .today-clear.show {
            display: block;
        }

        /* 日历弹窗 */
        .calendar-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }

        .calendar-modal.show {
            display: flex;
        }

        .calendar-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: bold;
        }

        .calendar-nav button {
            padding: 5px 12px;
            border: none;
            border-radius: 8px;
            background: #e3f2fd;
            cursor: pointer;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .calendar-weekday {
            text-align: center;
            font-weight: bold;
            padding: 10px 0;
            color: #666;
            font-size: 14px;
        }

        .calendar-day {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            background: #f8f9fa;
        }

        .calendar-day.empty {
            background: transparent;
            cursor: default;
        }

        .calendar-day.checked {
            background: #4caf50;
            color: white;
        }

        .calendar-day.today {
            border: 2px solid #2196f3;
        }

        .close-calendar {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body class="level-0">
    <div id="fireworks"></div>
    <div class="container">
        <div class="header">
            <h1>🌟 作业打卡 🌟</h1>
            <div class="current-date" id="current-date"></div>
            <div class="stats">
                <span id="total-days"></span>
                <div id="level-badge-container"></div>
            </div>
            <button class="view-calendar-btn" onclick="openCalendar()">📅 查看历史打卡</button>
        </div>

        <div class="kid-switch">
            <button class="kid-btn xiuxiu active" data-kid="xiuxiu" onclick="switchKid('xiuxiu')">👧 秀秀</button>
            <button class="kid-btn xiaoyan" data-kid="xiaoyan" onclick="switchKid('xiaoyan')">👧 小妍</button>
        </div>

        <div class="checklist">
            <div id="today-clear" class="today-clear">🎉 今日全部完成！太棒了！🎉</div>
            <div id="check-items"></div>
            <button class="submit-btn" id="submit-btn" onclick="submitToday()">✅ 提交今日打卡</button>
            <button class="reset-btn" onclick="resetToday()">🔄 重置今日打卡</button>
        </div>

        <div class="encouragement" id="encouragement">
            <div class="encouragement-text" id="encouragement-text"></div>
        </div>
    </div>

    <!-- 日历弹窗 -->
    <div class="calendar-modal" id="calendar-modal">
        <div class="calendar-container">
            <div class="calendar-header">
                <span id="calendar-month"></span>
                <div class="calendar-nav">
                    <button onclick="prevMonth()">◀</button>
                    <button onclick="nextMonth()">▶</button>
                </div>
            </div>
            <div class="calendar-grid" id="calendar-grid">
            </div>
            <button class="close-calendar" onclick="closeCalendar()">关闭</button>
        </div>
    </div>

<script>
// 配置数据
const config = {
    xiuxiu: {
        name: '秀秀',
        items: [
            { id: 'math', name: '数学', special: false },
            { id: 'chinese', name: '语文', special: false },
            { id: 'denny-english', name: 'Denny英语', special: true },
            { id: 'lantian-chinese', name: '蓝天语文', special: true },
            { id: 'chorus', name: '合唱', special: false }
        ]
    },
    xiaoyan: {
        name: '小妍',
        items: [
            { id: 'math', name: '数学', special: false },
            { id: 'chinese', name: '语文', special: false },
            { id: 'english', name: '英语', special: false },
            { id: 'rainbow-english', name: 'Rainbow英语', special: true },
            { id: 'dance', name: '舞蹈', special: false },
            { id: 'violin', name: '小提琴', special: false }
        ]
    }
};

// 鼓励文案
const encouragements = [
    '太棒了！完成得真漂亮！🎉',
    '你真棒！继续加油！💪',
    '哇！今天也完成了，太厉害啦！✨',
    '完美！你就是最棒的！🏆',
    '太棒啦！离目标更近一步了！🎯',
    '做得好！继续保持！⭐',
    '天才就是日复一日的坚持！💯',
    '又进步了一天！真了不起！🌹',
    '打卡成功！你太优秀了！🌈',
    '坚持就是胜利！为你骄傲！👍'
];

// 等级配置
const levels = [
    { min: 0, max: 10, badge: '🌱 新手启程', level: 0 },
    { min: 11, max: 30, badge: '🌿 坚持之星', level: 1 },
    { min: 31, max: 60, badge: '🌳 习惯养成', level: 2 },
    { min: 61, max: 100, badge: '💎 坚持不懈', level: 3 },
    { min: 101, max: 200, badge: '🔥 超级自律', level: 4 },
    { min: 201, max: 9999, badge: '👑 传奇打卡王', level: 5 }
];

const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
let currentKid = 'xiuxiu';
let currentCalendarDate = new Date();
let data = loadData();

// 更新统计信息和等级
function updateStats() {
    const kidData = data[currentKid];
    document.getElementById('total-days').textContent = `累计打卡 ${kidData.totalDays} 天`;
    
    // 计算当前等级
    const currentLevelInfo = levels.find(l => kidData.totalDays >= l.min && kidData.totalDays <= l.max);
    // 设置主题色
    document.body.className = '';
    document.body.classList.add(`level-${currentLevelInfo.level}`);
    
    // 显示等级徽章
    const container = document.getElementById('level-badge-container');
    container.innerHTML = `<div class="level-badge">${currentLevelInfo.badge}</div>`;
    
    renderCalendar();
}

// 加载数据
function loadData() {
    const saved = localStorage.getItem('homeworkCheckData');
    if (saved) {
        return JSON.parse(saved);
    }
    return {
        xiuxiu: { 
            totalDays: 0, 
            lastDate: null, 
            today: {}, 
            submitted: false,
            history: {} // 日期字符串: 是否完成
        },
        xiaoyan: { 
            totalDays: 0, 
            lastDate: null, 
            today: {}, 
            submitted: false,
            history: {}
        }
    };
}

// 保存数据
function saveData() {
    localStorage.setItem('homeworkCheckData', JSON.stringify(data));
}

// 获取今天日期字符串
function getToday() {
    return new Date().toDateString();
}

// 获取年月日键
function getDateKey(date) {
    return `${date.getFullYear()}-${date.getMonth()}-${date.getDate()}`;
}

// 格式化显示日期
function formatDateDisplay(date) {
    const year = date.getFullYear();
    const month = date.getMonth() + 1;
    const day = date.getDate();
    const week = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'][date.getDay()];
    return `${year}年${month}月${day}日 ${week}`;
}

// 切换孩子
function switchKid(kid) {
    currentKid = kid;
    document.querySelectorAll('.kid-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`[data-kid="${kid}"]`).classList.add('active');
    render();
}

// 渲染清单
function render() {
    const kidData = data[currentKid];
    const items = config[currentKid].items;
    const today = getToday();

    // 显示当前日期
    document.getElementById('current-date').textContent = formatDateDisplay(new Date());

    // 如果日期变了，重置今日状态
    if (kidData.lastDate !== today) {
        checkAndResetToday();
    }

    // 渲染项目
    const container = document.getElementById('check-items');
    container.innerHTML = '';
    
    items.forEach(item => {
        const isChecked = kidData.today[item.id] || false;
        const div = document.createElement('div');
        div.className = `check-item ${isChecked ? 'checked' : ''} ${item.special ? 'special-item' : ''} ${kidData.submitted ? 'disabled' : ''}`;
        div.innerHTML = `
            <div class="check-box">${isChecked ? '✓' : ''}</div>
            <div class="check-text">
                ${item.name}
                ${item.special ? '<span class="badge">特色课</span>' : ''}
            </div>
        `;
        if (!kidData.submitted) {
            div.onclick = () => toggleItem(item.id);
        }
        container.appendChild(div);
    });

    // 更新提交按钮状态
    document.getElementById('submit-btn').disabled = kidData.submitted;

    // 更新统计
    updateStats();

    // 检查是否今日全部完成
    checkAllCompleted();
}

// 日期变化时重置今日状态，如果昨天完成了就累计天数 - 修复版本：累计只在提交时做一次
function checkAndResetToday() {
    const kidData = data[currentKid];
    const today = getToday();
    
    if (kidData.lastDate !== today) {
        // 如果之前那天已经提交了，累计已经在提交时处理过了，这里只重置状态
        kidData.lastDate = today;
        kidData.today = {};
        kidData.submitted = false;
        saveData();
    }
}

// 提交今日打卡
function submitToday() {
    const kidData = data[currentKid];
    const items = config[currentKid].items;
    const uncompletedCount = items.filter(item => !kidData.today[item.id]).length;
    
    // 如果还有未完成的作业，弹出确认框询问
    if (uncompletedCount > 0) {
        if (!confirm(`还有 ${uncompletedCount} 项作业未完成，确定要提交今日打卡吗？`)) {
            // 用户点击取消，不提交
            return;
        }
        // 用户点击确认，继续提交流程
    } else {
        // 全部完成，正常确认提交
        if (!confirm('确认提交今日打卡？提交后就不能修改了，只能重置。')) {
            return;
        }
    }
    
    kidData.submitted = true;
    const todayKey = getDateKey(new Date());
    kidData.history[todayKey] = true;
    // 提交的时候只增加一次，避免重复计数
    kidData.totalDays++;
    saveData();
    render();
    showRandomEncouragement();
    createFireworks();
    alert('🎉 今日打卡提交成功！继续坚持哦！');
}

// 检查是否全部完成
function isAllCompleted(todayData) {
    const items = config[currentKid].items;
    return items.every(item => todayData[item.id]);
}

// 检查并显示全部完成提示
function checkAllCompleted() {
    const kidData = data[currentKid];
    const allCompleted = isAllCompleted(kidData.today);
    const indicator = document.getElementById('today-clear');
    if (allCompleted && Object.keys(kidData.today).length > 0) {
        indicator.classList.add('show');
    } else {
        indicator.classList.remove('show');
    }
}

// 切换打卡状态
function toggleItem(itemId) {
    const kidData = data[currentKid];
    if (kidData.submitted) return;
    
    const newState = !(kidData.today[itemId]);
    kidData.today[itemId] = newState;
    saveData();
    render();

    if (newState) {
        // 打卡成功，显示鼓励和特效
        showRandomEncouragement();
        createFireworks();
    }

    checkAllCompleted();
}

// 重置今日
function resetToday() {
    if (confirm('确定要重置今日所有打卡吗？提交记录会清除。')) {
        const kidData = data[currentKid];
        const wasSubmitted = kidData.submitted;
        kidData.today = {};
        kidData.submitted = false;
        const todayKey = getDateKey(new Date());
        delete kidData.history[todayKey];
        if (wasSubmitted && kidData.totalDays > 0) {
            kidData.totalDays--;
        }
        saveData();
        render();
        document.getElementById('encouragement').classList.remove('show');
    }
}

// 显示随机鼓励
function showRandomEncouragement() {
    const randomIndex = Math.floor(Math.random() * encouragements.length);
    document.getElementById('encouragement-text').textContent = encouragements[randomIndex];
    const encouragementDiv = document.getElementById('encouragement');
    encouragementDiv.classList.remove('show');
    setTimeout(() => {
        encouragementDiv.classList.add('show');
    }, 10);
}

// 多种特效类型
const effectTypes = ['fireworks', 'stars', 'confetti', 'bubbles', 'pop'];

// 创建随机特效
function createFireworks() {
    const container = document.getElementById('fireworks');
    container.innerHTML = '';
    
    // 随机选一种特效
    const effectType = effectTypes[Math.floor(Math.random() * effectTypes.length)];
    
    switch(effectType) {
        case 'fireworks':
            createFireworksEffect(container);
            break;
        case 'stars':
            createStarsEffect(container);
            break;
        case 'confetti':
            createConfettiEffect(container);
            break;
        case 'bubbles':
            createBubblesEffect(container);
            break;
        case 'pop':
            createPopEffect(container);
            break;
    }
}

// 经典礼花爆炸效果
function createFireworksEffect(container) {
    const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeaa7', '#fd79a8', '#a29bfe', '#ffe066'];
    const particleCount = 40;
    
    // 单层爆炸，更轻盈
    for (let i = 0; i < particleCount; i++) {
        setTimeout(() => {
            const particle = document.createElement('div');
            particle.className = 'firework-particle';
            
            const angle = (Math.PI * 2 * i) / particleCount;
            const distance = 80 + Math.random() * 150;
            const tx = Math.cos(angle) * distance;
            const ty = Math.sin(angle) * distance;
            
            const centerX = window.innerWidth / 2 + (Math.random() - 0.5) * 150;
            const centerY = window.innerHeight / 2 + (Math.random() - 0.5) * 80;
            
            particle.style.left = centerX + 'px';
            particle.style.top = centerY + 'px';
            particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            particle.style.width = (4 + Math.random() * 6) + 'px';
            particle.style.height = particle.style.width;
            particle.style.setProperty('--tx', tx + 'px');
            particle.style.setProperty('--ty', ty + 'px');
            
            container.appendChild(particle);
            
            setTimeout(() => {
                if (particle.parentNode && particle.parentNode.contains(particle)) {
                    particle.parentNode.removeChild(particle);
                }
            }, 1500);
        }, i * 20);
    }
}

// 星星坠落效果
function createStarsEffect(container) {
    const stars = ['⭐', '🌟', '💫', '✨', '💖'];
    const centerX = window.innerWidth / 2;
    const centerY = window.innerHeight / 3;
    
    for (let i = 0; i < 20; i++) {
        setTimeout(() => {
            const star = document.createElement('div');
            star.className = 'star-particle';
            star.textContent = stars[Math.floor(Math.random() * stars.length)];
            
            const tx = (Math.random() - 0.5) * 400;
            const ty = 200 + Math.random() * 300;
            const r = Math.random() * 360;
            
            star.style.left = centerX + 'px';
            star.style.top = centerY + 'px';
            star.style.setProperty('--tx', tx + 'px');
            star.style.setProperty('--ty', ty + 'px');
            star.style.setProperty('--r', r);
            
            container.appendChild(star);
            
            setTimeout(() => {
                if (container.contains(star)) container.removeChild(star);
            }, 2000);
        }, i * 100);
    }
}

// 彩纸飘落效果
function createConfettiEffect(container) {
    const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeaa7', '#fd79a8', '#a29bfe', '#ffe066', '#ff9ff3'];
    
    for (let i = 0; i < 50; i++) {
        setTimeout(() => {
            const confetti = document.createElement('div');
            confetti.className = 'confetti-particle';
            
            const tx = (Math.random() - 0.5) * 500;
            const ty = 150 + Math.random() * 400;
            const r = Math.random() * 360;
            
            confetti.style.left = (Math.random() * window.innerWidth) + 'px';
            confetti.style.top = '-20px';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.setProperty('--tx', tx + 'px');
            confetti.style.setProperty('--ty', ty + 'px');
            confetti.style.setProperty('--r', r);
            confetti.style.transform = `rotate(${r}deg)`;
            
            container.appendChild(confetti);
            
            setTimeout(() => {
                if (confetti.parentNode) confetti.parentNode.removeChild(confetti);
            }, 1800);
        }, i * 40);
    }
}

// 泡泡上升效果
function createBubblesEffect(container) {
    const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#a29bfe', '#fd79a8', '#ffe066'];
    const centerX = window.innerWidth / 2;
    
    for (let i = 0; i < 30; i++) {
        setTimeout(() => {
            const bubble = document.createElement('div');
            bubble.className = 'bubble-particle';
            
            const tx = (Math.random() - 0.5) * 300;
            const ty = -150 - Math.random() * 200;
            
            bubble.style.left = centerX + (Math.random() - 0.5) * 300 + 'px';
            bubble.style.top = window.innerHeight + 'px';
            bubble.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            bubble.style.width = (10 + Math.random() * 20) + 'px';
            bubble.style.height = bubble.style.width;
            bubble.style.setProperty('--tx', tx + 'px');
            bubble.style.setProperty('--ty', ty + 'px');
            
            container.appendChild(bubble);
            
            setTimeout(() => {
                if (container.contains(bubble)) container.removeChild(bubble);

        }, i * 50);

}

// 点赞飞屏效果
function createPopEffect(container) {

// 打开日历弹窗
function openCalendar() {
    currentCalendarDate = new Date();
    document.getElementById('calendar-modal').classList.add('show');
    renderCalendar();
}

// 关闭日历弹窗
function closeCalendar() {
    document.getElementById('calendar-modal').classList.remove('show');
}

// 上一个月
function prevMonth() {
    currentCalendarDate.setMonth(currentCalendarDate.getMonth() - 1);
    renderCalendar();
}

// 下一个月
function nextMonth() {
    currentCalendarDate.setMonth(currentCalendarDate.getMonth() + 1);
    renderCalendar();
}

// 渲染日历
function renderCalendar() {
    if (!document.getElementById('calendar-grid')) return;
    
    const year = currentCalendarDate.getFullYear();
    const month = currentCalendarDate.getMonth();
    
    document.getElementById('calendar-month').textContent = `${year}年${month + 1}月`;
    
    const grid = document.getElementById('calendar-grid');
    grid.innerHTML = '';
    
    // 添加星期表头
    weekDays.forEach(day => {
        const div = document.createElement('div');
        div.className = 'calendar-weekday';
        div.textContent = day;
        grid.appendChild(div);
    });
    
    // 获取当月第一天是星期几
    const firstDay = new Date(year, month, 1).getDay();
    // 获取当月天数
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    
    // 填空白
    for (let i = 0; i < firstDay; i++) {
        const div = document.createElement('div');
        div.className = 'calendar-day empty';
        grid.appendChild(div);
    }
    
    // 填日期
    const today = new Date();
    const kidData = data[currentKid];
    
    for (let day = 1; day <= daysInMonth; day++) {
        const div = document.createElement('div');
        div.className = 'calendar-day';
        div.textContent = day;
        
        const dateKey = `${year}-${month}-${day}`;
        if (kidData.history[dateKey]) {
            div.classList.add('checked');
        }
        
        if (year === today.getFullYear() && month === today.getMonth() && day === today.getDate()) {
            div.classList.add('today');
        }
        
        grid.appendChild(div);
    }
}

// 初始化
render();
</script>
